<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrowdWatch - Login</title>
    <link rel="stylesheet" href="static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 0;
        }
        .login-card {
            background-color: var(--card-dark);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }
        .login-card h1 {
            margin-bottom: 30px;
            color: var(--text-primary);
        }
        .login-card h1 i {
            color: var(--accent-green);
            margin-right: 10px;
        }
        .login-card .btn {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1><i class="fas fa-users-viewfinder"></i> CrowdWatch</h1>
        <p style="color: var(--text-secondary); margin-bottom: 30px; font-size: 0.9rem;">
            AI Crowd Density Analysis & Congestion Prediction System
        </p>

        <form action="dashboard.html" method="GET">
            <div class="form-group" style="text-align: left;">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="Authority Email" required value="admin@crowdwatch.com">
            </div>
            <div class="form-group" style="text-align: left;">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="••••••••" required value="password">
            </div>
            <button type="submit" class="btn btn-success">Login to Dashboard <i class="fas fa-arrow-right"></i></button>
        </form>
    </div>

</body>
</html>
